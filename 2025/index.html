<script>
(function() {
  var gifs = [];
  for (var i = 3; i <= 36; i++) {
    gifs.push('assets/2025-gif-' + String(i).padStart(3, '0') + '.gif');
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function fillDanceGroup(id) {
    var el = document.getElementById(id);
    var count = Math.floor(Math.random() * 5) + 3;
    var picked = shuffle(gifs).slice(0, count);
    el.innerHTML = picked.map(function(g) {
      return '<img src="' + g + '" width="120" height="120"/>';
    }).join('');
  }

  function randomColor() {
    return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
  }

  function activatePartyMode() {
    var page = document.getElementById('page');
    page.classList.add('gif-background', 'party-mode');

    // Animated gradient header
    var box = document.getElementById('header-box');
    var colors = [randomColor(), randomColor(), randomColor(), randomColor(), randomColor()];
    box.style.background = 'linear-gradient(-45deg, ' + colors.join(', ') + ')';
    box.style.backgroundSize = '400% 400%';
    box.style.animation = 'gradient 5s ease infinite';
    box.classList.remove('bg-gray-400');

    // Show celebration gifs
    document.getElementById('boop-left').style.display = '';
    document.getElementById('boop-right').style.display = '';
    document.getElementById('globe').style.display = '';

    // Update title
    var title = document.getElementById('title');
    title.textContent = 'HAPPY BIRTHDAY BRIDGET!';
    title.className = 'text-6xl md:text-8xl font-bold text-white comic-sans';

    // Banner
    var banner = document.getElementById('banner');
    banner.className = 'bg-yellow-300 text-center py-1 border-y-2 border-black marquee';
    document.getElementById('banner-text').className = 'comic-sans';

    // Play text
    document.getElementById('play-text').className = 'text-xl font-bold mb-2 comic-sans';

    // Footer message
    var footer = document.getElementById('footer-msg');
    footer.className = 'text-4xl font-bold text-fuchsia-600 comic-sans';

    // Fill dancing groups
    fillDanceGroup('dance1');
    fillDanceGroup('dance2');
    fillDanceGroup('dance3');
    fillDanceGroup('dance4');
    fillDanceGroup('dance5');
    fillDanceGroup('dance6');
    fillDanceGroup('dance7');

    // Show gallery
    var gallery = document.getElementById('gallery');
    gallery.style.display = '';
    setTimeout(function() { gallery.style.opacity = '1'; }, 50);
  }

  function deactivatePartyMode() {
    var page = document.getElementById('page');
    page.classList.remove('gif-background', 'party-mode');

    var box = document.getElementById('header-box');
    box.style.background = '';
    box.style.animation = '';
    box.classList.add('bg-gray-400');

    document.getElementById('boop-left').style.display = 'none';
    document.getElementById('boop-right').style.display = 'none';
    document.getElementById('globe').style.display = 'none';

    var title = document.getElementById('title');
    title.textContent = 'Happy Birthday Bridget';
    title.className = 'text-5xl md:text-6xl font-bold text-white';

    var banner = document.getElementById('banner');
    banner.className = 'bg-white text-center py-1 border-y-2 border-black marquee';
    document.getElementById('banner-text').className = '';

    document.getElementById('play-text').className = 'text-xl font-bold mb-2';

    var footer = document.getElementById('footer-msg');
    footer.className = 'text-4xl font-bold text-gray-600';
  }

  var audio = document.getElementById('audio');
  audio.addEventListener('play', activatePartyMode);
  audio.addEventListener('pause', deactivatePartyMode);
})();
</script>
